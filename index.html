<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Автокликер</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 30px;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 20px;
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Автокликер</h1>
  <button id="startBtn">Начать кликать (10 сек)</button>
  <div id="status">Нажмите для старта</div>
  
  <script>
    const { ipcRenderer } = require('electron');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');

    console.log('App started');

    startBtn.addEventListener('click', () => {
      startBtn.disabled = true;
      status.textContent = 'Кликание в течение 10 секунд...';
      
      console.log('Start button clicked');
      ipcRenderer.send('start-clicker');
    });

    ipcRenderer.on('clicker-complete', () => {
      startBtn.disabled = false;
      status.textContent = 'Готово! Кликание завершено.';
      console.log('Clicker complete');
    });

    ipcRenderer.on('clicker-error', (event, error) => {
      startBtn.disabled = false;
      status.textContent = 'Ошибка: ' + error;
      console.log('Clicker error:', error);
    });

    ipcRenderer.on('log', (event, message) => {
      console.log('[Main Process]:', message);
    });

    ipcRenderer.on('ps-output', (event, data) => {
      console.log('[PowerShell]:', data);
    });

    ipcRenderer.on('ps-error', (event, data) => {
      console.error('[PowerShell Error]:', data);
    });
  </script>
</body>
</html>
