<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Автокликер</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #f0f0f0;
      }
      h1 {
        color: #333;
        font-size: 24px;
        margin-bottom: 30px;
      }
      .buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s;
      }
      button:hover {
        background: #45a049;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      #status {
        margin-top: 20px;
        font-size: 16px;
        color: #666;
        text-align: center;
      }
      .escape-hint {
        font-size: 14px;
        color: #888;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Автокликер</h1>
    <div class="buttons">
      <button id="startBtn">Клики (10 сек)</button>
      <button id="startInfiniteBtn">Клики до ESC</button>
    </div>
    <div class="buttons">
      <button id="startHybridBtn">Клик+Клавиши (10 сек)</button>
      <button id="startHybridInfiniteBtn">Клик+Клавиши до ESC</button>
    </div>
    <div id="status">Нажмите для старта</div>
    <div class="escape-hint" id="escapeHint" style="display: none">Нажмите ESC для остановки</div>

    <script>
      const { ipcRenderer } = require("electron");
      const startBtn = document.getElementById("startBtn");
      const startInfiniteBtn = document.getElementById("startInfiniteBtn");
      const startHybridBtn = document.getElementById("startHybridBtn");
      const startHybridInfiniteBtn = document.getElementById("startHybridInfiniteBtn");
      const status = document.getElementById("status");
      const escapeHint = document.getElementById("escapeHint");

      console.log("App started");

      startBtn.addEventListener("click", () => {
        startBtn.disabled = true;
        startInfiniteBtn.disabled = true;
        startHybridBtn.disabled = true;
        startHybridInfiniteBtn.disabled = true;
        status.textContent = "Кликание в течение 10 секунд...";
        escapeHint.style.display = "none";

        console.log("Start button clicked");
        ipcRenderer.send("start-clicker");
      });

      startInfiniteBtn.addEventListener("click", () => {
        startBtn.disabled = true;
        startInfiniteBtn.disabled = true;
        startHybridBtn.disabled = true;
        startHybridInfiniteBtn.disabled = true;
        status.textContent = "Кликание... (нажмите ESC для остановки)";
        escapeHint.style.display = "block";

        console.log("Start infinite button clicked");
        ipcRenderer.send("start-clicker-infinite");
      });

      startHybridBtn.addEventListener("click", () => {
        startBtn.disabled = true;
        startInfiniteBtn.disabled = true;
        startHybridBtn.disabled = true;
        startHybridInfiniteBtn.disabled = true;
        status.textContent = "Клики + клавиши в течение 10 секунд...";
        escapeHint.style.display = "none";

        console.log("Start hybrid button clicked");
        ipcRenderer.send("start-hybrid-clicker");
      });

      startHybridInfiniteBtn.addEventListener("click", () => {
        startBtn.disabled = true;
        startInfiniteBtn.disabled = true;
        startHybridBtn.disabled = true;
        startHybridInfiniteBtn.disabled = true;
        status.textContent = "Клики + клавиши... (нажмите ESC для остановки)";
        escapeHint.style.display = "block";

        console.log("Start hybrid infinite button clicked");
        ipcRenderer.send("start-hybrid-clicker-infinite");
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          console.log("ESC pressed, stopping clicker");
          ipcRenderer.send("stop-clicker");
        }
      });

      ipcRenderer.on("clicker-complete", () => {
        startBtn.disabled = false;
        startInfiniteBtn.disabled = false;
        startHybridBtn.disabled = false;
        startHybridInfiniteBtn.disabled = false;
        status.textContent = "Готово! Кликание завершено.";
        escapeHint.style.display = "none";
        console.log("Clicker complete");
      });

      ipcRenderer.on("clicker-stopped", () => {
        startBtn.disabled = false;
        startInfiniteBtn.disabled = false;
        startHybridBtn.disabled = false;
        startHybridInfiniteBtn.disabled = false;
        status.textContent = "Кликание остановлено.";
        escapeHint.style.display = "none";
        console.log("Clicker stopped");
      });

      ipcRenderer.on("clicker-error", (event, error) => {
        startBtn.disabled = false;
        startInfiniteBtn.disabled = false;
        startHybridBtn.disabled = false;
        startHybridInfiniteBtn.disabled = false;
        status.textContent = "Ошибка: " + error;
        escapeHint.style.display = "none";
        console.log("Clicker error:", error);
      });

      ipcRenderer.on("log", (event, message) => {
        console.log("[Main Process]:", message);
      });

      ipcRenderer.on("ps-output", (event, data) => {
        console.log("[PowerShell]:", data);
      });

      ipcRenderer.on("ps-error", (event, data) => {
        console.error("[PowerShell Error]:", data);
      });
    </script>
  </body>
</html>
